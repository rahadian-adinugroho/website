<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <title>Islam</title>
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#16a34a" stroke-width="3"/>
  <!-- Crescent: large disc on the left minus a smaller disc to the right.
       Main r=18 minus mask r=14 with offset 12 gives a thick moon
       with sharp horns at top-right and bottom-right. -->
  <mask id="crescent">
    <rect width="64" height="64" fill="white"/>
    <circle cx="36" cy="32" r="14" fill="black"/>
  </mask>
  <circle cx="24" cy="32" r="18" fill="#16a34a" mask="url(#crescent)"/>
  <!-- 5-pointed star — leftmost point overlaps the crescent's inner edge.
       Center (34, 28), R=8, r=3.2 — sized to match the source. -->
  <polygon points="34,20 35.9,25.4 41.6,25.5 37,29 38.7,34.5 34,31.2 29.3,34.5 31,29 26.4,25.5 32.1,25.4" fill="#16a34a"/>
</svg>
