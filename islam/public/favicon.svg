<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <title>Islam</title>
  <!-- Outer ring (green) -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#16a34a" stroke-width="3"/>
  <!-- Crescent + star, scaled and rotated -30° around center.
       The reference SVG uses mm units with the crescent at roughly
       (21..285, 36..248). Center of content: (153, 142).
       Transform pipeline (right-to-left in SVG):
         1. translate(-153 -142) — move content center to origin
         2. scale(0.21)          — fit into ~60px
         3. rotate(-30)          — counterclockwise 30°
         4. translate(32 32)     — center in 64x64 viewBox -->
  <g transform="translate(32 32) rotate(-30) scale(0.21) translate(-153 -142)">
    <!-- Crescent (from reference, recolored green) -->
    <path d="M 125.13485,36.187753 C 67.60819,37.282014 21.25984,84.307148 21.259843,142.094 c 0,58.47207 47.465507,105.9375 105.937507,105.9375 27.33767,0 52.26496,-10.38375 71.0625,-27.40625 -13.25294,7.61817 -28.62654,11.96875 -45,11.96875 -49.92978,0 -90.437507,-40.50772 -90.437507,-90.4375 0,-49.929782 40.507727,-90.437497 90.437507,-90.437497 16.50367,0 31.98804,4.425296 45.3125,12.15625 -18.83343,-17.191643 -43.8851,-27.687502 -71.375,-27.6875 -0.68522,0 -1.38037,-0.01297 -2.0625,0 z"
          fill="#16a34a"/>
    <!-- Star (from reference, recolored green, moved towards the crescent) -->
    <g transform="translate(-50.0214 -34.99975) translate(-20 0)">
      <path d="m 316.15204,177.15572 -34.08314,11.84728 -0.73517,36.076 -21.79971,-28.75397 -34.53749,10.44891 20.61017,-29.61822 -20.61017,-29.61822 34.53749,10.4489 21.79971,-28.75397 0.73517,36.076 34.08314,11.84729 z"
            fill="#16a34a"/>
    </g>
  </g>
</svg>
