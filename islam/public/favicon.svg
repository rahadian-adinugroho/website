<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <title>Islam</title>
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#16a34a" stroke-width="3"/>
  <!-- Crescent: large disc on the left minus a smaller disc to the right
       gives a thick moon with horns at top-right and bottom-right. -->
  <mask id="crescent">
    <rect width="64" height="64" fill="white"/>
    <circle cx="32" cy="32" r="12" fill="black"/>
  </mask>
  <circle cx="22" cy="32" r="15" fill="#16a34a" mask="url(#crescent)"/>
  <!-- 5-pointed star — leftmost point overlaps the crescent's inner edge.
       Center (32, 28), R=7, r=2.8. -->
  <polygon points="32,21 33.7,25.7 38.7,25.8 34.7,28.9 36.1,33.7 32,30.8 27.9,33.7 29.3,28.9 25.3,25.8 30.3,25.7" fill="#16a34a"/>
</svg>
