name: Preview

on:
  pull_request:
    branches: [main]
    paths:
      - "landing/**"
      - "blog/**"
  workflow_dispatch:

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview-landing:
    name: Preview Landing
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile
        working-directory: landing

      - name: Build
        run: bun run build
        working-directory: landing

      - name: Deploy preview
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: raharoho-landing
          directory: landing/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  preview-blog:
    name: Preview Blog
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile
        working-directory: blog

      - name: Build
        run: bun run build
        working-directory: blog

      - name: Deploy preview
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: raharoho-blog
          directory: blog/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
